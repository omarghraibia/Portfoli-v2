<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Démo Boutons | Portfolio</title>
  <style>
    /* variables globales */
    :root {
      --bg: #07111f;
      --accent: #00e5a0;
      --accent-dark: #00261a;
      --text-light: #f8fafc;
      --radius: 8px;
      --transition: 0.3s ease; 
      --glow: rgba(0, 229, 160, 0.3);
    }

    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif; 
      background: var(--bg);
      color: var(--text-light);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* conteneur pour la démo */
    .screen {
      text-align: center;
      max-width: 600px;
      width: 100%;
    }

    .screen h1 {
      margin-bottom: 2rem;
      font-size: 1.5rem;
    }

    .button-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* style commun des boutons */
    .cta-button {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: bold;
      text-decoration: none;
      cursor: pointer;
      transition: all var(--transition);
    }

    .cta-button svg {
      width: 18px;
      height: 18px;
      stroke-width: 2;
      stroke: currentColor;
      fill: none;
    }

    /* bouton principal */
    .btn-primary {
      background: var(--accent);
      color: var(--accent-dark);
      border: 2px solid var(--accent);
    }

    /* effet au survol */
    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px var(--glow);
    }

    /* bouton secondaire */
    .btn-outline {
      background: transparent;
      color: var(--accent);
      border: 2px solid var(--accent);
    }

    .btn-outline:hover {
      background: var(--accent);
      color: var(--accent-dark);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px var(--glow);
    }
  </style>
</head>
<body>
  <div class="screen">
    <h1>Boutons Call-to-Action</h1>
    <div class="button-row">
      
      <a href="#" class="cta-button btn-primary">
        <svg viewBox="0 0 24 24">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" />
        </svg>
        Télécharger CV
      </a>

      <a href="#projets" class="cta-button btn-outline">
        <svg viewBox="0 0 24 24">
          <polyline points="16 18 22 12 16 6" />
          <polyline points="8 6 2 12 8 18" />
        </svg>
        Mes projets
      </a>

    </div>
  </div>
</body>
</html>
